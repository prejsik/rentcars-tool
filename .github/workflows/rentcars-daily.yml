name: RentCars daily run

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/rentcars-daily.yml"
      - "src/rentcars/**"
      - "rentcars.config.example.json"
      - "package.json"
      - "package-lock.json"
      - "README.md"
  # GitHub cron uses UTC. These two entries plus the Warsaw-hour gate below
  # keep the real run near 03:17 Europe/Warsaw during both summer and winter time.
  schedule:
    - cron: "17 1 * * *"
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      locations:
        description: "Comma-separated RentCars.pl locations"
        required: true
        default: "Warszawa,Krakow,Gdansk,Katowice,Wroclaw,Poznan"
      rolling_days:
        description: "How many pickup start dates from tomorrow"
        required: true
        default: "30"
      durations:
        description: "Comma-separated rental durations"
        required: true
        default: "2,3,4,5,6,7,8,9,10"
      speed_mode:
        description: "Scraper speed mode: safe, fast, or turbo"
        required: true
        default: "fast"
      location_concurrency:
        description: "Parallel RentCars.pl pickup locations per scenario"
        required: true
        default: "6"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  SCHEDULE_LOCATIONS: "Warszawa,Krakow,Gdansk,Katowice,Wroclaw,Poznan"
  SCHEDULE_ROLLING_DAYS: "30"
  SCHEDULE_DURATIONS: "2,3,4,5,6,7,8,9,10"
  SCHEDULE_SPEED_MODE: "fast"
  SCHEDULE_LOCATION_CONCURRENCY: "6"
  PUSH_TEST_LOCATIONS: "Warszawa,Krakow,Gdansk,Katowice,Wroclaw,Poznan"
  PUSH_TEST_ROLLING_DAYS: "1"
  PUSH_TEST_DURATIONS: "2"
  PUSH_TEST_SPEED_MODE: "fast"
  PUSH_TEST_LOCATION_CONCURRENCY: "2"
  SCHEDULE_SCRAPER_TIMEOUT: "330m"
  PUSH_TEST_SCRAPER_TIMEOUT: "45m"

jobs:
  rentcars:
    name: Run RentCars.pl scraper
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment:
      name: github-pages
      url: ${{ steps.pages-deployment.outputs.page_url }}

    steps:
      - name: Check Warsaw schedule gate
        id: gate
        shell: bash
        run: |
          warsaw_now="$(TZ=Europe/Warsaw date '+%Y-%m-%d %H:%M:%S %Z')"
          trigger_schedule="${{ github.event.schedule }}"

          echo "warsaw_now=$warsaw_now" >> "$GITHUB_OUTPUT"
          echo "Warsaw time now: $warsaw_now"

          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "Non-scheduled run requested, bypassing schedule gate."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          scheduled_minute="${trigger_schedule%% *}"
          schedule_tail="${trigger_schedule#* }"
          scheduled_hour="${schedule_tail%% *}"
          utc_date="$(date -u +%Y-%m-%d)"
          intended_warsaw_hour="$(TZ=Europe/Warsaw date -d "$utc_date $scheduled_hour:$scheduled_minute UTC" +%H)"
          intended_warsaw_time="$(TZ=Europe/Warsaw date -d "$utc_date $scheduled_hour:$scheduled_minute UTC" '+%Y-%m-%d %H:%M:%S %Z')"

          echo "Schedule expression: $trigger_schedule"
          echo "Scheduled UTC trigger maps to Warsaw: $intended_warsaw_time"

          if [[ "$intended_warsaw_hour" == "03" ]]; then
            echo "This scheduled trigger targets 03:xx in Warsaw, running scraper."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "This scheduled trigger does not target 03:xx in Warsaw, skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.gate.outputs.should_run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Resolve run options
        if: steps.gate.outputs.should_run == 'true'
        id: options
        shell: bash
        env:
          INPUT_LOCATIONS: ${{ inputs.locations }}
          INPUT_ROLLING_DAYS: ${{ inputs.rolling_days }}
          INPUT_DURATIONS: ${{ inputs.durations }}
          INPUT_SPEED_MODE: ${{ inputs.speed_mode }}
          INPUT_LOCATION_CONCURRENCY: ${{ inputs.location_concurrency }}
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            default_locations="$PUSH_TEST_LOCATIONS"
            default_rolling_days="$PUSH_TEST_ROLLING_DAYS"
            default_durations="$PUSH_TEST_DURATIONS"
            default_speed_mode="$PUSH_TEST_SPEED_MODE"
            default_location_concurrency="$PUSH_TEST_LOCATION_CONCURRENCY"
          else
            default_locations="$SCHEDULE_LOCATIONS"
            default_rolling_days="$SCHEDULE_ROLLING_DAYS"
            default_durations="$SCHEDULE_DURATIONS"
            default_speed_mode="$SCHEDULE_SPEED_MODE"
            default_location_concurrency="$SCHEDULE_LOCATION_CONCURRENCY"
          fi

          locations="${INPUT_LOCATIONS:-$default_locations}"
          rolling_days="${INPUT_ROLLING_DAYS:-$default_rolling_days}"
          durations="${INPUT_DURATIONS:-$default_durations}"
          speed_mode="${INPUT_SPEED_MODE:-$default_speed_mode}"
          location_concurrency="${INPUT_LOCATION_CONCURRENCY:-$default_location_concurrency}"

          echo "locations=$locations" >> "$GITHUB_OUTPUT"
          echo "rolling_days=$rolling_days" >> "$GITHUB_OUTPUT"
          echo "durations=$durations" >> "$GITHUB_OUTPUT"
          echo "speed_mode=$speed_mode" >> "$GITHUB_OUTPUT"
          echo "location_concurrency=$location_concurrency" >> "$GITHUB_OUTPUT"

          echo "Locations: $locations"
          echo "Rolling days: $rolling_days"
          echo "Durations: $durations"
          echo "Speed mode: $speed_mode"
          echo "Location concurrency: $location_concurrency"

      - name: Run RentCars.pl scraper
        id: scraper
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          mkdir -p output

          if [[ "${{ github.event_name }}" == "push" ]]; then
            scraper_timeout="$PUSH_TEST_SCRAPER_TIMEOUT"
          else
            scraper_timeout="$SCHEDULE_SCRAPER_TIMEOUT"
          fi

          echo "Scraper timeout: $scraper_timeout"
          set +e
          timeout --kill-after=30s "$scraper_timeout" bash -c '
            set -o pipefail
            node src/rentcars/run.js \
              --config rentcars.config.example.json \
              --locations="${{ steps.options.outputs.locations }}" \
              --rolling-days="${{ steps.options.outputs.rolling_days }}" \
              --durations-days="${{ steps.options.outputs.durations }}" \
              --sort-orders=price_insurance \
              --speed-mode="${{ steps.options.outputs.speed_mode }}" \
              --location-concurrency="${{ steps.options.outputs.location_concurrency }}" \
              --timeout-ms=30000 \
              --output-json output/rentcars-results-latest.json \
              2> >(tee output/rentcars-run-error.txt >&2) \
              | tee output/rentcars-run-log.txt
          '
          scraper_status=$?
          set -e

          echo "scraper_status=$scraper_status" >> "$GITHUB_OUTPUT"
          if [[ "$scraper_status" -eq 124 ]]; then
            echo "::warning::RentCars scraper reached the controlled timeout after $scraper_timeout. Publishing the latest partial snapshot."
          elif [[ "$scraper_status" -ne 0 ]]; then
            echo "::warning::RentCars scraper exited with status $scraper_status. Publishing any files that were already created."
          fi

          if [[ ! -f output/rentcars-results-latest.json && "$scraper_status" -ne 0 ]]; then
            exit "$scraper_status"
          fi

      - name: Generate RentCars.pl HTML report
        id: report
        if: always() && steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          if [[ -f output/rentcars-results-latest.json ]]; then
            node src/rentcars/reportHtml.js output/rentcars-results-latest.json output/rentcars-report.html
            echo "report_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::RentCars JSON output is missing; report generation skipped."
            echo "report_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure GitHub Pages is enabled
        id: pages-status
        if: always() && steps.gate.outputs.should_run == 'true' && steps.report.outputs.report_exists == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          pages_api_url="${GITHUB_API_URL:-https://api.github.com}/repos/${GITHUB_REPOSITORY}/pages"

          get_status=$(
            curl --silent --show-error \
              --output /tmp/pages.json \
              --write-out "%{http_code}" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GITHUB_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "$pages_api_url"
          )

          if [[ "$get_status" == "200" ]]; then
            page_url=$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('/tmp/pages.json', 'utf8')); process.stdout.write(data.html_url || '');")
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "page_url=$page_url" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is enabled: $page_url"
            exit 0
          fi

          if [[ "$get_status" != "404" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "page_url=" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub Pages status check returned HTTP $get_status; Pages deploy skipped."
            exit 0
          fi

          create_status=$(
            curl --silent --show-error \
              --request POST \
              --output /tmp/pages-create.json \
              --write-out "%{http_code}" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GITHUB_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --data '{"build_type":"workflow"}' \
              "$pages_api_url"
          )

          if [[ "$create_status" == "201" || "$create_status" == "409" || "$create_status" == "422" ]]; then
            retry_status=$(
              curl --silent --show-error \
                --output /tmp/pages.json \
                --write-out "%{http_code}" \
                --header "Accept: application/vnd.github+json" \
                --header "Authorization: Bearer ${GITHUB_TOKEN}" \
                --header "X-GitHub-Api-Version: 2022-11-28" \
                "$pages_api_url"
            )

            if [[ "$retry_status" == "200" ]]; then
              page_url=$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('/tmp/pages.json', 'utf8')); process.stdout.write(data.html_url || '');")
              echo "enabled=true" >> "$GITHUB_OUTPUT"
              echo "page_url=$page_url" >> "$GITHUB_OUTPUT"
              echo "GitHub Pages is enabled: $page_url"
              exit 0
            fi
          fi

          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "page_url=" >> "$GITHUB_OUTPUT"
          echo "::warning::GitHub Pages is not enabled and could not be enabled automatically; Pages deploy skipped."

      - name: Prepare GitHub Pages site
        if: always() && steps.gate.outputs.should_run == 'true' && steps.report.outputs.report_exists == 'true' && steps.pages-status.outputs.enabled == 'true'
        shell: bash
        run: |
          mkdir -p pages
          cp output/rentcars-report.html pages/index.html
          cp output/rentcars-report.html pages/report.html
          [[ -f output/rentcars-results-latest.json ]] && cp output/rentcars-results-latest.json pages/rentcars-results-latest.json
          [[ -f output/rentcars-run-log.txt ]] && cp output/rentcars-run-log.txt pages/rentcars-run-log.txt
          [[ -f output/rentcars-run-error.txt ]] && cp output/rentcars-run-error.txt pages/rentcars-run-error.txt

      - name: Configure GitHub Pages
        if: always() && steps.gate.outputs.should_run == 'true' && steps.report.outputs.report_exists == 'true' && steps.pages-status.outputs.enabled == 'true'
        uses: actions/configure-pages@v5
        continue-on-error: true

      - name: Upload GitHub Pages artifact
        if: always() && steps.gate.outputs.should_run == 'true' && steps.report.outputs.report_exists == 'true' && steps.pages-status.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        continue-on-error: true
        with:
          path: pages

      - name: Deploy GitHub Pages
        id: pages-deployment
        if: always() && steps.gate.outputs.should_run == 'true' && steps.report.outputs.report_exists == 'true' && steps.pages-status.outputs.enabled == 'true'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Upload RentCars.pl results
        id: upload
        if: always() && steps.gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rentcars-results-${{ github.run_number }}
          path: |
            output/rentcars-results-latest.json
            output/rentcars-report.html
            output/rentcars-run-log.txt
            output/rentcars-run-error.txt
            artifacts/rentcars/**
          if-no-files-found: warn
          retention-days: 14

      - name: Notify Telegram
        if: always() && steps.gate.outputs.should_run == 'true' && steps.upload.outputs['artifact-url'] != ''
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PAGE_URL: ${{ steps.pages-deployment.outputs.page_url || steps.pages-status.outputs.page_url }}
          ARTIFACT_URL: ${{ steps.upload.outputs['artifact-url'] }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ -z "$TELEGRAM_BOT_TOKEN" || -z "$TELEGRAM_CHAT_ID" ]]; then
            echo "::warning::Telegram secrets are missing; notification skipped."
            exit 0
          fi

          if [[ -f output/rentcars-results-latest.json ]]; then
            progress=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('output/rentcars-results-latest.json','utf8')); const completed=Number(data.completed_scenario_count ?? data.scenario_count ?? (data.scenarios || []).length); const expected=Number(data.expected_scenario_count ?? completed); const label=data.is_partial ? 'partial' : 'complete'; process.stdout.write(label + ' ' + completed + '/' + expected + ' scenarios');")
          else
            progress="no JSON report"
          fi

          if [[ -n "$PAGE_URL" ]]; then
            report_url="${PAGE_URL%/}/report.html"
            message=$(printf 'RentCars.pl: raport jest gotowy (%s).\n\nRaport HTML:\n%s\n\nArtifact backup:\n%s\n\nGitHub Actions run:\n%s\n' "$progress" "$report_url" "$ARTIFACT_URL" "$RUN_URL")
          else
            message=$(printf 'RentCars.pl: raport jest gotowy (%s).\n\nArtifact:\n%s\n\nGitHub Actions run:\n%s\n' "$progress" "$ARTIFACT_URL" "$RUN_URL")
          fi

          if ! curl --fail --show-error --silent \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${message}" \
            --data-urlencode "disable_web_page_preview=true"; then
            echo "::warning::Telegram notification failed; scraper results were still uploaded."
          fi
