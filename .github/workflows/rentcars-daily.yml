name: RentCars daily run

on:
  schedule:
    - cron: "17 23 * * *"
    - cron: "17 0 * * *"
  workflow_dispatch:
    inputs:
      locations:
        description: "Comma-separated locations; blank uses the shared catalog"
        required: false
        default: ""
      rolling_days:
        description: "How many pickup start dates from tomorrow"
        required: true
        default: "30"
      durations:
        description: "Comma-separated rental durations"
        required: true
        default: "2,3,4,5,6,7,8,9,10"
      speed_mode:
        description: "Scraper speed mode: safe, fast, or turbo"
        required: true
        default: "fast"
      sort_orders:
        description: "Comma-separated RentCars.pl sort modes"
        required: true
        default: "price_insurance"
      location_concurrency:
        description: "Parallel RentCars.pl pickup locations per scenario"
        required: true
        default: "6"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  SCHEDULE_ROLLING_DAYS: "30"
  SCHEDULE_DURATIONS: "2,3,4,5,6,7,8,9,10"
  SCHEDULE_SPEED_MODE: "fast"
  SCHEDULE_SORT_ORDERS: "price_insurance"
  SCHEDULE_LOCATION_CONCURRENCY: "6"
  SCHEDULE_CHUNK_SCRAPER_TIMEOUT: "135m"

jobs:
  plan:
    name: Plan RentCars.pl matrix
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      locations: ${{ steps.options.outputs.locations }}
      rolling_days: ${{ steps.options.outputs.rolling_days }}
      durations: ${{ steps.options.outputs.durations }}
      speed_mode: ${{ steps.options.outputs.speed_mode }}
      sort_orders: ${{ steps.options.outputs.sort_orders }}
      location_concurrency: ${{ steps.options.outputs.location_concurrency }}
      chunk_timeout: ${{ steps.options.outputs.chunk_timeout }}
      expected_scenario_count: ${{ steps.options.outputs.expected_scenario_count }}
      expected_check_count: ${{ steps.options.outputs.expected_check_count }}
      run_started_at: ${{ steps.options.outputs.run_started_at }}
      matrix: ${{ steps.options.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Warsaw schedule gate
        id: gate
        shell: bash
        run: |
          warsaw_now="$(TZ=Europe/Warsaw date '+%Y-%m-%d %H:%M:%S %Z')"
          trigger_schedule="${{ github.event.schedule }}"

          echo "Warsaw time now: $warsaw_now"
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          scheduled_minute="${trigger_schedule%% *}"
          schedule_tail="${trigger_schedule#* }"
          scheduled_hour="${schedule_tail%% *}"
          utc_date="$(date -u +%Y-%m-%d)"
          intended_warsaw_hour="$(TZ=Europe/Warsaw date -d "$utc_date $scheduled_hour:$scheduled_minute UTC" +%H)"
          intended_warsaw_time="$(TZ=Europe/Warsaw date -d "$utc_date $scheduled_hour:$scheduled_minute UTC" '+%Y-%m-%d %H:%M:%S %Z')"

          echo "Schedule expression: $trigger_schedule"
          echo "Scheduled UTC trigger maps to Warsaw: $intended_warsaw_time"
          if [[ "$intended_warsaw_hour" == "01" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve matrix options
        id: options
        shell: bash
        env:
          INPUT_LOCATIONS: ${{ inputs.locations }}
          INPUT_ROLLING_DAYS: ${{ inputs.rolling_days }}
          INPUT_DURATIONS: ${{ inputs.durations }}
          INPUT_SPEED_MODE: ${{ inputs.speed_mode }}
          INPUT_SORT_ORDERS: ${{ inputs.sort_orders }}
          INPUT_LOCATION_CONCURRENCY: ${{ inputs.location_concurrency }}
        run: |
          if [[ "${{ steps.gate.outputs.should_run }}" != "true" ]]; then
            echo 'matrix={"include":[{"chunk_id":"skip","start_dates":"skip"}]}' >> "$GITHUB_OUTPUT"
            echo "locations=" >> "$GITHUB_OUTPUT"
            echo "rolling_days=0" >> "$GITHUB_OUTPUT"
            echo "durations=" >> "$GITHUB_OUTPUT"
            echo "speed_mode=fast" >> "$GITHUB_OUTPUT"
            echo "sort_orders=price_insurance" >> "$GITHUB_OUTPUT"
            echo "location_concurrency=1" >> "$GITHUB_OUTPUT"
            echo "chunk_timeout=1m" >> "$GITHUB_OUTPUT"
            echo "expected_scenario_count=0" >> "$GITHUB_OUTPUT"
            echo "expected_check_count=0" >> "$GITHUB_OUTPUT"
            echo "run_started_at=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          catalog_locations="$(node -e "const { defaultLocationCities } = require('./src/rentcars/locations'); process.stdout.write(defaultLocationCities().join(','));")"
          locations="${INPUT_LOCATIONS:-$catalog_locations}"
          rolling_days="${INPUT_ROLLING_DAYS:-$SCHEDULE_ROLLING_DAYS}"
          durations="${INPUT_DURATIONS:-$SCHEDULE_DURATIONS}"
          speed_mode="${INPUT_SPEED_MODE:-$SCHEDULE_SPEED_MODE}"
          sort_orders="${INPUT_SORT_ORDERS:-$SCHEDULE_SORT_ORDERS}"
          location_concurrency="${INPUT_LOCATION_CONCURRENCY:-$SCHEDULE_LOCATION_CONCURRENCY}"
          chunk_timeout="$SCHEDULE_CHUNK_SCRAPER_TIMEOUT"

          if ! [[ "$rolling_days" =~ ^[0-9]+$ ]] || [[ "$rolling_days" -lt 1 ]]; then
            echo "::error::rolling_days must be a positive integer. Received: $rolling_days"
            exit 1
          fi
          if ! [[ "$location_concurrency" =~ ^[1-6]$ ]]; then
            echo "::error::location_concurrency must be an integer from 1 to 6. Received: $location_concurrency"
            exit 1
          fi

          duration_count=0
          IFS=',' read -ra duration_parts <<< "$durations"
          for duration in "${duration_parts[@]}"; do
            trimmed="${duration//[[:space:]]/}"
            if ! [[ "$trimmed" =~ ^[0-9]+$ ]] || [[ "$trimmed" -lt 1 ]]; then
              echo "::error::durations must contain positive integers. Received: $duration"
              exit 1
            fi
            duration_count=$((duration_count + 1))
          done

          rolling_days_number=$((10#$rolling_days))
          expected_scenario_count=$((rolling_days_number * duration_count))
          airport_count="$(node -e "const { expectedAirportCount } = require('./src/rentcars/locations'); process.stdout.write(String(expectedAirportCount(process.argv[1].split(','))));" "$locations")"
          sort_count="$(node -e "process.stdout.write(String(process.argv[1].split(',').map(x => x.trim()).filter(Boolean).length || 1));" "$sort_orders")"
          expected_check_count=$((expected_scenario_count * airport_count * sort_count))

          dates=()
          for ((day_index=0; day_index<rolling_days_number; day_index++)); do
            dates+=("$(TZ=Europe/Warsaw date -d "tomorrow +${day_index} days" +%F)")
          done

          if [[ "$duration_count" -ge 11 ]]; then
            chunk_size=3
          else
            chunk_size=5
          fi
          matrix_json=$(node -e '
            const size = Number(process.argv[1]);
            const dates = process.argv.slice(2);
            const include = [];
            for (let index = 0; index < dates.length; index += size) {
              include.push({
                chunk_id: String(include.length + 1).padStart(3, "0"),
                start_dates: dates.slice(index, index + size).join(",")
              });
            }
            process.stdout.write(JSON.stringify({ include }));
          ' "$chunk_size" "${dates[@]}")
          run_started_at="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          echo "locations=$locations" >> "$GITHUB_OUTPUT"
          echo "rolling_days=$rolling_days" >> "$GITHUB_OUTPUT"
          echo "durations=$durations" >> "$GITHUB_OUTPUT"
          echo "speed_mode=$speed_mode" >> "$GITHUB_OUTPUT"
          echo "sort_orders=$sort_orders" >> "$GITHUB_OUTPUT"
          echo "location_concurrency=$location_concurrency" >> "$GITHUB_OUTPUT"
          echo "chunk_timeout=$chunk_timeout" >> "$GITHUB_OUTPUT"
          echo "expected_scenario_count=$expected_scenario_count" >> "$GITHUB_OUTPUT"
          echo "expected_check_count=$expected_check_count" >> "$GITHUB_OUTPUT"
          echo "run_started_at=$run_started_at" >> "$GITHUB_OUTPUT"
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"

          echo "Locations: $locations"
          echo "Rolling days: $rolling_days"
          echo "Durations: $durations"
          echo "Expected scenarios: $expected_scenario_count"
          echo "Expected airport checks: $expected_check_count"
          echo "Dates per chunk: $chunk_size"

  scrape:
    name: Scrape chunk ${{ matrix.chunk_id }}
    needs: plan
    if: needs.plan.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 150
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run RentCars.pl scraper chunk
        id: scraper
        shell: bash
        run: |
          mkdir -p output
          chunk_id="${{ matrix.chunk_id }}"
          json_path="output/rentcars-results-chunk-${chunk_id}.json"
          log_path="output/rentcars-run-chunk-${chunk_id}-log.txt"
          error_path="output/rentcars-run-chunk-${chunk_id}-error.txt"
          chunk_timeout="${{ needs.plan.outputs.chunk_timeout }}"

          echo "Start dates: ${{ matrix.start_dates }}"
          echo "Chunk timeout: $chunk_timeout"

          set +e
          timeout --kill-after=30s "$chunk_timeout" node src/rentcars/run.js \
            --config rentcars.config.example.json \
            --locations="${{ needs.plan.outputs.locations }}" \
            --start-dates="${{ matrix.start_dates }}" \
            --durations-days="${{ needs.plan.outputs.durations }}" \
            --sort-orders="${{ needs.plan.outputs.sort_orders }}" \
            --speed-mode="${{ needs.plan.outputs.speed_mode }}" \
            --location-concurrency="${{ needs.plan.outputs.location_concurrency }}" \
            --timeout-ms=30000 \
            --output-json "$json_path" \
            > >(tee "$log_path") \
            2> >(tee "$error_path" >&2)
          scraper_status=$?
          set -e

          echo "scraper_status=$scraper_status" >> "$GITHUB_OUTPUT"
          if [[ "$scraper_status" -eq 124 ]]; then
            echo "::warning::Chunk $chunk_id reached its controlled timeout. Uploading the latest snapshot."
          elif [[ "$scraper_status" -ne 0 ]]; then
            echo "::warning::Chunk $chunk_id exited with status $scraper_status. Uploading available files."
          fi

      - name: Upload RentCars.pl chunk
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rentcars-part-${{ matrix.chunk_id }}
          path: |
            output/rentcars-results-chunk-${{ matrix.chunk_id }}.json
            output/rentcars-run-chunk-${{ matrix.chunk_id }}-log.txt
            output/rentcars-run-chunk-${{ matrix.chunk_id }}-error.txt
            artifacts/rentcars/**
          if-no-files-found: warn
          retention-days: 7

  merge:
    name: Merge and publish RentCars.pl report
    needs:
      - plan
      - scrape
    if: always() && needs.plan.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: github-pages
      url: ${{ steps.pages-deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Download RentCars.pl chunks
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: rentcars-part-*
          path: downloaded-parts
          merge-multiple: false

      - name: Merge chunk JSON files
        shell: bash
        run: |
          mkdir -p output
          node src/rentcars/mergeResults.js \
            --input-dir downloaded-parts \
            --output-json output/rentcars-results-latest.json \
            --expected-scenario-count="${{ needs.plan.outputs.expected_scenario_count }}" \
            --expected-check-count="${{ needs.plan.outputs.expected_check_count }}" \
            --started-at="${{ needs.plan.outputs.run_started_at }}" \
            --base-url=https://rentcars.pl \
            --locations="${{ needs.plan.outputs.locations }}" \
            --sort-orders="${{ needs.plan.outputs.sort_orders }}"

      - name: Generate RentCars.pl HTML report
        id: report
        shell: bash
        run: |
          node src/rentcars/reportHtml.js output/rentcars-results-latest.json output/rentcars-report.html
          echo "report_exists=true" >> "$GITHUB_OUTPUT"

      - name: Generate RentCars.pl Excel summary
        id: workbook
        shell: bash
        run: |
          node src/rentcars/reportXlsx.js output/rentcars-results-latest.json output/rentcars-summary.xlsx
          echo "workbook_exists=true" >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub Pages is enabled
        id: pages-status
        if: always() && steps.report.outputs.report_exists == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          pages_api_url="${GITHUB_API_URL:-https://api.github.com}/repos/${GITHUB_REPOSITORY}/pages"
          get_status=$(curl --silent --show-error --output /tmp/pages.json --write-out "%{http_code}" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$pages_api_url")

          if [[ "$get_status" == "200" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$get_status" != "404" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub Pages status check returned HTTP $get_status."
            exit 0
          fi

          create_status=$(curl --silent --show-error --request POST --output /tmp/pages-create.json --write-out "%{http_code}" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data '{"build_type":"workflow"}' \
            "$pages_api_url")
          if [[ "$create_status" == "201" || "$create_status" == "409" || "$create_status" == "422" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub Pages could not be enabled; HTTP $create_status."
          fi

      - name: Prepare GitHub Pages site
        if: always() && steps.report.outputs.report_exists == 'true' && steps.pages-status.outputs.enabled == 'true'
        shell: bash
        run: |
          mkdir -p pages
          cp output/rentcars-report.html pages/index.html
          cp output/rentcars-report.html pages/report.html

      - name: Configure GitHub Pages
        if: always() && steps.report.outputs.report_exists == 'true' && steps.pages-status.outputs.enabled == 'true'
        uses: actions/configure-pages@v5
        continue-on-error: true

      - name: Upload GitHub Pages artifact
        if: always() && steps.report.outputs.report_exists == 'true' && steps.pages-status.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        continue-on-error: true
        with:
          path: pages

      - name: Deploy GitHub Pages
        id: pages-deployment
        if: always() && steps.report.outputs.report_exists == 'true' && steps.pages-status.outputs.enabled == 'true'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Upload merged RentCars.pl results
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rentcars-results-${{ github.run_number }}
          path: |
            output/rentcars-results-latest.json
            output/rentcars-report.html
            output/rentcars-summary.xlsx
          if-no-files-found: warn
          retention-days: 30

      - name: Notify Telegram
        if: always()
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PAGE_URL: ${{ steps.pages-deployment.outcome == 'success' && steps.pages-deployment.outputs.page_url || '' }}
          ARTIFACT_URL: ${{ steps.upload.outputs['artifact-url'] }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ -z "$TELEGRAM_BOT_TOKEN" || -z "$TELEGRAM_CHAT_ID" ]]; then
            echo "::error::Telegram secrets are missing."
            exit 1
          fi

          if [[ -f output/rentcars-results-latest.json ]]; then
            progress=$(node -e '
              const fs = require("fs");
              const data = JSON.parse(fs.readFileSync("output/rentcars-results-latest.json", "utf8"));
              const status = data.run_status || (data.is_partial ? "partial" : "complete");
              const scenarios = `${data.completed_scenario_count || 0}/${data.expected_scenario_count || 0} scenarios`;
              const checks = `${data.successful_check_count || 0} successful, ${data.failed_check_count || 0} failed, ${data.missing_check_count || 0} missing / ${data.expected_check_count || 0} checks`;
              process.stdout.write(`${status}; ${scenarios}; ${checks}; generated ${data.generated_at || "unknown"}`);
            ')
          else
            progress="report generation failed; no merged JSON"
          fi

          message=$(printf 'RentCars.pl: run finished (%s).\n\n' "$progress")
          if [[ -n "$PAGE_URL" ]]; then
            message+=$(printf 'Current HTML report:\n%sreport.html\n\n' "${PAGE_URL%/}/")
          else
            message+=$(printf 'GitHub Pages deployment was not confirmed for this run.\n\n')
          fi
          if [[ -n "$ARTIFACT_URL" ]]; then
            message+=$(printf 'Artifact backup:\n%s\n\n' "$ARTIFACT_URL")
          fi
          message+=$(printf 'GitHub Actions run:\n%s\n' "$RUN_URL")

          curl --fail --show-error --silent \
            --retry 3 \
            --retry-delay 3 \
            --retry-all-errors \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${message}" \
            --data-urlencode "disable_web_page_preview=true"
